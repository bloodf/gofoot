<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="GoFoot">
  <title>GoFoot</title>
  <desc>GoFoot favicon — simplified emblem for tiny sizes.</desc>
  <!-- Background: solid green so the favicon reads at any size -->
  <rect width="64" height="64" rx="12" fill="#0a8f4a"/>
  <!-- Field ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#ffffff" stroke-width="3"/>
  <!-- Center line -->
  <line x1="32" y1="8" x2="32" y2="56" stroke="#ffffff" stroke-width="2"/>
  <!-- Center circle -->
  <circle cx="32" cy="32" r="7" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Ball -->
  <circle cx="32" cy="32" r="5" fill="#f5d35e"/>
  <polygon points="32,28 34,30 33,33 31,33 30,30" fill="#0a8f4a"/>
  <!-- G (left) — simplified block -->
  <g fill="#ffffff">
    <rect x="6"  y="20" width="14" height="3"/>
    <rect x="6"  y="20" width="3"  height="24"/>
    <rect x="6"  y="41" width="14" height="3"/>
    <rect x="17" y="20" width="3"  height="14"/>
    <rect x="11" y="34" width="9"  height="3"/>
  </g>
  <!-- F (right) — simplified block + tiny arrow -->
  <g fill="#ffffff">
    <rect x="44" y="20" width="14" height="3"/>
    <rect x="44" y="20" width="3"  height="24"/>
    <rect x="44" y="31" width="9"  height="3"/>
    <!-- Up arrow tip -->
    <polygon points="51,17 55,17 55,19 58,19 53,12 48,19 51,19"/>
    <!-- Down arrow tip -->
    <polygon points="51,47 55,47 55,45 58,45 53,52 48,45 51,45"/>
  </g>
</svg>
