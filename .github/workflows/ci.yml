name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm approve-builds --all || true
      - run: pnpm install
      - run: pnpm check:brands
      - run: pnpm check:attribution
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm build
        env:
          SESSION_HMAC_SECRET: ci-secret-at-least-16-chars
          TURSO_DATABASE_URL: file:./.data/gofoot-ci.db
      - run: pnpm exec playwright install chromium
      - run: pnpm test:mobile
        env:
          SESSION_HMAC_SECRET: ci-secret-at-least-16-chars
          TURSO_DATABASE_URL: file:./.data/gofoot-e2e.db

  # E2E full suite is manual-only (user preference)
  e2e-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm exec playwright install chromium
      - run: pnpm test:e2e
